apiVersion: apps/v1
kind: Deployment
metadata:
  name: infersafev2-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infersafev2-gateway
  template:
    metadata:
      labels:
        app: infersafev2-gateway
    spec:
      containers:
        - name: gateway
          image: infersafev2-gateway:latest
          ports:
            - containerPort: 8000
          env:
            - name: BACKEND_BASE_URL
              value: http://infersafev2-load-balancer:9000
            - name: MAX_CONTEXT_TOKENS
              value: "4096"
---
apiVersion: v1
kind: Service
metadata:
  name: infersafev2-gateway
spec:
  selector:
    app: infersafev2-gateway
  ports:
    - port: 8000
      targetPort: 8000
