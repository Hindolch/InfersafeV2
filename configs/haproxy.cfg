global
    log stdout format raw local0
    maxconn 4096

defaults
    log global
    mode http
    option httplog
    timeout connect 5s
    timeout client 5m
    timeout server 5m
    timeout http-request 30s
    timeout tunnel 5m

frontend vllm_frontend
    bind *:9000
    default_backend vllm_backends

backend vllm_backends
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    default-server inter 5s fall 2 rise 1
    server vllm0 vllm-0:8000 check
    # Uncomment when vllm-1 / vllm-2 services exist in docker-compose.yml:
    # server vllm1 vllm-1:8000 check
    # server vllm2 vllm-2:8000 check

frontend stats
    bind *:8404
    http-request use-service prometheus-exporter if { path /metrics }
