services:
  gateway:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: infersafev2-gateway
    environment:
      BACKEND_BASE_URL: http://load-balancer:9000
      MAX_CONTEXT_TOKENS: ${MAX_CONTEXT_TOKENS:-2048}
      MAX_REQUEST_BYTES: ${MAX_REQUEST_BYTES:-1048576}
      MAX_QUEUE_DEPTH: ${MAX_QUEUE_DEPTH:-32}
      MAX_CONCURRENT_REQUESTS: ${MAX_CONCURRENT_REQUESTS:-8}
      MAX_JSON_DEPTH: ${MAX_JSON_DEPTH:-50}
      UPSTREAM_CONNECT_TIMEOUT_SECONDS: ${UPSTREAM_CONNECT_TIMEOUT_SECONDS:-10}
      UPSTREAM_READ_TIMEOUT_SECONDS: ${UPSTREAM_READ_TIMEOUT_SECONDS:-300}
    ports:
      - "8000:8000"
    depends_on:
      - load-balancer
    restart: unless-stopped

  load-balancer:
    image: haproxy:3.1
    container_name: infersafev2-load-balancer
    ports:
      - "9000:9000"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - vllm-0
    restart: unless-stopped

  # Default model: Qwen2.5-0.5B-Instruct-AWQ.
  # Rationale: official 4-bit AWQ variant plus a smaller context/scheduler budget to
  # maximize the chance of a healthy vLLM boot on a 4 GB GTX 1650.
  vllm-0:
    image: vllm/vllm-openai:latest
    container_name: infersafev2-vllm-0
    gpus: all
    command:
      - --model
      - ${MODEL_NAME:-Qwen/Qwen2.5-0.5B-Instruct-AWQ}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - ${MAX_MODEL_LEN:-2048}
      - --gpu-memory-utilization
      - ${GPU_MEMORY_UTILIZATION:-0.55}
      - --max-num-seqs
      - ${MAX_NUM_SEQS:-4}
      - --max-num-batched-tokens
      - ${MAX_NUM_BATCHED_TOKENS:-2048}
      - --served-model-name
      - ${SERVED_MODEL_NAME:-local-vllm}
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - model-cache:/root/.cache/huggingface
    restart: unless-stopped

  vllm-1:
    image: vllm/vllm-openai:latest
    container_name: infersafev2-vllm-1
    gpus: all
    command:
      - --model
      - ${MODEL_NAME:-Qwen/Qwen2.5-0.5B-Instruct-AWQ}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - ${MAX_MODEL_LEN:-2048}
      - --gpu-memory-utilization
      - ${GPU_MEMORY_UTILIZATION:-0.55}
      - --max-num-seqs
      - ${MAX_NUM_SEQS:-4}
      - --max-num-batched-tokens
      - ${MAX_NUM_BATCHED_TOKENS:-2048}
      - --served-model-name
      - ${SERVED_MODEL_NAME:-local-vllm}
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - model-cache:/root/.cache/huggingface
    restart: unless-stopped

  vllm-2:
    image: vllm/vllm-openai:latest
    container_name: infersafev2-vllm-2
    gpus: all
    command:
      - --model
      - ${MODEL_NAME:-Qwen/Qwen2.5-0.5B-Instruct-AWQ}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - ${MAX_MODEL_LEN:-2048}
      - --gpu-memory-utilization
      - ${GPU_MEMORY_UTILIZATION:-0.55}
      - --max-num-seqs
      - ${MAX_NUM_SEQS:-4}
      - --max-num-batched-tokens
      - ${MAX_NUM_BATCHED_TOKENS:-2048}
      - --served-model-name
      - ${SERVED_MODEL_NAME:-local-vllm}
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - model-cache:/root/.cache/huggingface
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: infersafev2-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    depends_on:
      - gateway
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: infersafev2-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  grafana-data:
  prometheus-data:
  model-cache:
